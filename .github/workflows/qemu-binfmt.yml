name: qemu-binfmt

on:
  pull_request:
  workflow_dispatch:

jobs:
  riscv64-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) 安装构建 QEMU 10 所需依赖
      - name: Install deps for building QEMU 10
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl xz-utils git ca-certificates file \
            ninja-build meson pkg-config libglib2.0-dev libpixman-1-dev libfdt-dev zlib1g-dev \
            binfmt-support

      # 2) 从源码构建并安装 QEMU 10 (linux-user)
      - name: Build and install QEMU 10 (linux-user)
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL https://download.qemu.org/qemu-10.0.3.tar.xz -o qemu-10.0.3.tar.xz
          tar -xf qemu-10.0.3.tar.xz
          cd qemu-10.0.3
          ./configure --target-list=riscv64-linux-user
          make -j"$(nproc)"
          sudo make install
          qemu-riscv64 -version

      # 3) 启用 binfmt（使用静态解释器），保证 --platform=riscv64 容器可在 x86 上运行
      - name: Enable binfmt for riscv64 (static interpreter)
        run: |
          set -euxo pipefail
          docker run --privileged --rm tonistiigi/binfmt --install riscv64
          update-binfmts --display | sed -n '1,200p' || true

      - name: Build x86 Go toolchain
        run: |

          # 1) 安装 amd64 的 bootstrap Go（用于在 amd64 上构建源码树）
          BOOT=/tmp/go-bootstrap
          curl -fsSL https://go.dev/dl/go1.25.0.linux-amd64.tar.gz -o /tmp/go.tar.gz
          tar -C /tmp -xzf /tmp/go.tar.gz
          mv /tmp/go "$BOOT"
          export GOROOT_BOOTSTRAP="$BOOT"

          # 2) 构建当前源码树（生成 $GITHUB_WORKSPACE/bin/go for amd64）
          cd "$GITHUB_WORKSPACE/src"
          ./make.bash

          GOOS=linux GOARCH=riscv64 "$GOROOT/bin/go" test -count=1 -a -v cmd/internal/testdir -run '^Test/codegen/zte-rva23\.go$'