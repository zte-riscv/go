name: test all in qemu10 rva23u64 ubuntu

on:
  pull_request:
  workflow_dispatch: 

jobs:
  riscv64-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps for building QEMU 10
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl xz-utils git ca-certificates file \
            ninja-build meson pkg-config libglib2.0-dev libpixman-1-dev libfdt-dev zlib1g-dev \
            binfmt-support

      - name: Build and install QEMU 10 (linux-user)
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL https://download.qemu.org/qemu-10.0.3.tar.xz -o qemu-10.0.3.tar.xz
          tar -xf qemu-10.0.3.tar.xz
          cd qemu-10.0.3
          ./configure --target-list=riscv64-linux-user
          make -j"$(nproc)"
          sudo make install
          qemu-riscv64 -version

      - name: Enable binfmt for riscv64 (static interpreter)
        run: |
          set -euxo pipefail
          docker run --privileged --rm tonistiigi/binfmt --install riscv64
          update-binfmts --display | sed -n '1,200p' || true

      - name: Build RV64 Go toolchain and run all.bash inside riscv64 container
        run: |
          set -euxo pipefail
          docker run --rm --platform=riscv64 -v "$GITHUB_WORKSPACE":/w -w /w ubuntu:22.04 bash -lc '
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && \
            apt-get install -y build-essential curl xz-utils ca-certificates git && \
            BOOT=/usr/local/go-bootstrap && \
            curl -fsSL https://go.dev/dl/go1.25.0.linux-riscv64.tar.gz -o /tmp/go.tgz && \
            tar -C /usr/local -xzf /tmp/go.tgz && \
            mv /usr/local/go "$BOOT" && \
            export GOROOT_BOOTSTRAP="$BOOT" && \
            cd src && \
            export GOARCH=riscv64 && \
            export GORISCV64=rva23u64 && \
            ./all.bash && \
            /w/bin/go version && \
            file /w/bin/go
          '